<section class="auth-shell">
  <div class="auth-card">
    <p class="section-kicker">Create account</p>
    <h2 class="section-title">Register</h2>

    <form class="auth-form">
      <label for="register-email">Email</label>
      <input id="register-email" type="email" placeholder="anna@example.com" />

      <label for="register-password">Password</label>
      <input id="register-password" type="password" placeholder="Create a password" />

      <label for="repeat-password">Repeat Password</label>
      <input id="repeat-password" type="password" placeholder="Repeat your password" />

      <button type="button" class="btn btn-primary full-width">Create Account</button>
    </form>
  </div>
</section>
