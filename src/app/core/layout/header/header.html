<header class="site-header">
  <div class="container header-wrapper">
    <a routerLink="/" class="brand">Vigo Recipe</a>

    <nav class="main-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
        >Home</a
      >
      <a routerLink="/recipes" routerLinkActive="active">Recipes</a>

      @if (isLoggedIn$ | async) {
        <span class="user-pill">{{ (currentUser$ | async)?.email }}</span>
        <button type="button" class="nav-button" (click)="logout()">Logout</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active">Login</a>
        <a routerLink="/register" routerLinkActive="active">Register</a>
      }
    </nav>
  </div>
</header>
